<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Our Discord</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 20% 20%, #2a0944 0%, #0d0221 50%, #000000 100%);
    overflow: hidden;
    position: relative;
  }

  /* Glowing background particles */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: float 8s ease-in-out infinite;
  }
  .glow1 { width: 300px; height: 300px; background: #5865F2; top: 10%; left: 10%; }
  .glow2 { width: 250px; height: 250px; background: #9b5de5; bottom: 10%; right: 10%; animation-delay: 2s; }
  .glow3 { width: 200px; height: 200px; background: #00f0ff; top: 50%; right: 20%; animation-delay: 4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-30px) translateX(20px); }
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(20, 20, 35, 0.85);
    border: 1px solid rgba(88, 101, 242, 0.4);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(88, 101, 242, 0.4), 0 0 80px rgba(0,0,0,0.6);
    animation: cardGlow 3s ease-in-out infinite alternate;
  }

  @keyframes cardGlow {
    0% { box-shadow: 0 0 40px rgba(88, 101, 242, 0.4), 0 0 80px rgba(0,0,0,0.6); }
    100% { box-shadow: 0 0 60px rgba(88, 101, 242, 0.8), 0 0 100px rgba(0,0,0,0.7); }
  }

  .discord-logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 15px #5865F2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  h1 {
    color: #ffffff;
    font-size: 26px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #5865F2;
  }

  p {
    color: #b9bbbe;
    font-size: 15px;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .join-btn {
    position: relative;
    display: inline-block;
    text-decoration: none;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    padding: 15px 45px;
    border-radius: 50px;
    background: linear-gradient(135deg, #5865F2, #9b5de5);
    overflow: hidden;
    letter-spacing: 1px;
    transition: transform 0.3s ease;
    box-shadow: 0 0 20px rgba(88,101,242,0.6);
  }

  .join-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px rgba(88,101,242,0.9), 0 0 60px rgba(155,93,229,0.6);
  }

  .join-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
    transform: skewX(-25deg);
    animation: shine 2.5s infinite;
  }

  @keyframes shine {
    0% { left: -75%; }
    100% { left: 125%; }
  }

  .join-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50px;
    border: 2px solid transparent;
    animation: ring 2s linear infinite;
  }

  @keyframes ring {
    0% { box-shadow: 0 0 0 0 rgba(88,101,242,0.6); }
    100% { box-shadow: 0 0 0 12px rgba(88,101,242,0); }
  }

  .footer-text {
    margin-top: 20px;
    font-size: 12px;
    color: #6f737a;
  }
</style>
</head>
<body>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>
  <div class="glow glow3"></div>

  <div class="card">
    <img class="discord-logo" src="https://upload.wikimedia.org/wikipedia/en/9/98/Discord_logo.svg" alt="Discord Logo">
    <h1>Join Our Gaming Community</h1>
    <p>Connect with fellow gamers, chat live, join tournaments, and never miss an update. Click below to join our Discord server now!</p>
    <a class="join-btn" href="https://discord.gg/QpmHQm4yq" target="_blank">Join Discord</a>
    <div class="footer-text">discord.gg/QpmHQm4yq</div>
  </div>

</body>
</html>
