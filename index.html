<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fighter Player | Subscribe</title>
<style>
  :root{
    --bg:#0b0e14;
    --bg2:#11161f;
    --accent:#39ff88;
    --accent2:#7c5cff;
    --text:#e8ecf1;
    --muted:#8a93a6;
    --card:#151b27;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI', Roboto, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
  }

  .bg-grid{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(124,92,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,255,0.07) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:0;
    mask-image: radial-gradient(circle at 50% 40%, rgba(0,0,0,0.9), transparent 75%);
  }

  .glow{
    position:fixed;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(57,255,136,0.15), transparent 70%);
    top:-200px; left:-150px;
    z-index:0;
    pointer-events:none;
  }

  .glow2{
    position:fixed;
    width:500px;height:500px;
    background:radial-gradient(circle, rgba(124,92,255,0.15), transparent 70%);
    bottom:-150px; right:-100px;
    z-index:0;
    pointer-events:none;
  }

  .card{
    position:relative;
    z-index:1;
    background:var(--card);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:20px;
    padding:48px 40px;
    max-width:440px;
    width:90%;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation:fadeUp 0.8s ease forwards;
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(24px);}
    to{opacity:1; transform:translateY(0);}
  }

  .eyebrow{
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:14px;
  }

  .logo{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:800;
    color:#0b0e14;
    box-shadow:0 0 40px rgba(57,255,136,0.4);
  }

  h1{
    font-size:28px;
    font-weight:800;
    letter-spacing:0.5px;
    margin-bottom:8px;
  }

  h1 span{
    color:var(--accent);
  }

  p.tagline{
    color:var(--muted);
    font-size:15px;
    line-height:1.6;
    margin-bottom:30px;
  }

  .subscribe-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:16px 24px;
    background:linear-gradient(135deg, #ff0033, #ff4d6d);
    color:#fff;
    font-size:16px;
    font-weight:700;
    border:none;
    border-radius:12px;
    text-decoration:none;
    cursor:pointer;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow:0 8px 24px rgba(255,0,51,0.35);
  }

  .subscribe-btn:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 12px 32px rgba(255,0,51,0.5);
  }

  .subscribe-btn:active{
    transform:scale(0.98);
  }

  .subscribe-btn svg{
    width:22px;height:22px;
    flex-shrink:0;
  }

  .stats{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-top:28px;
    padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.06);
  }

  .stat{
    text-align:center;
  }

  .stat strong{
    display:block;
    font-size:18px;
    color:var(--accent2);
  }

  .stat span{
    font-size:12px;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
  }

  .footer-note{
    margin-top:24px;
    font-size:12px;
    color:var(--muted);
  }
</style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="card">
    <div class="eyebrow">Gaming Channel</div>
    <div class="logo">FP</div>
    <h1>Fighter <span>Player</span></h1>
    <p class="tagline">
      Epic gameplay, intense battles aur daily content — subscribe karke is journey ka hissa banein!
    </p>

    <a class="subscribe-btn" href="https://youtube.com/@fighter.player?si=MRjs4rRkMO8ZCmjF" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2c-.3-1.1-1.1-1.9-2.2-2.2C19.4 3.5 12 3.5 12 3.5s-7.4 0-9.3.5C1.6 4.3.8 5.1.5 6.2 0 8.1 0 12 0 12s0 3.9.5 5.8c.3 1.1 1.1 1.9 2.2 2.2 1.9.5 9.3.5 9.3.5s7.4 0 9.3-.5c1.1-.3 1.9-1.1 2.2-2.2.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
      Subscribe on YouTube
    </a>

    <div class="stats">
      <div class="stat">
        <strong>🎮</strong>
        <span>Gaming</span>
      </div>
      <div class="stat">
        <strong>🔥</strong>
        <span>Daily Streams</span>
      </div>
      <div class="stat">
        <strong>⚡</strong>
        <span>Pro Content</span>
      </div>
    </div>

    <p class="footer-note">Hit subscribe & turn on notifications 🔔</p>
  </div>

  <script>
    document.querySelector('.subscribe-btn').addEventListener('click', function(){
      this.style.transform = 'scale(0.95)';
      setTimeout(()=> this.style.transform = '', 150);
    });
  </script>

</body>
</html>
